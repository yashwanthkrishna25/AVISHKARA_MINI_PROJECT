name: parkease2
description: Smart Parking Reservation System
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.9.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.5
  firebase_core: ^4.11.0
  firebase_auth: ^6.5.4
  cloud_firestore: ^6.6.0
  firebase_storage: ^13.4.3
  firebase_messaging: ^16.4.1

  google_maps_flutter: ^2.17.1
  geolocator: ^14.0.3
  geocoding: ^4.0.0

  google_sign_in: ^6.3.0
  flutter_svg: ^2.3.0
  lottie: ^3.4.0
  shimmer: ^3.0.0
  # provider: ^6.1.5
  cached_network_image: ^3.4.1
  intl: ^0.20.3
  shared_preferences: ^2.5.5
  image_picker: ^1.2.2
  uuid: ^4.5.3
  url_launcher: ^6.3.2
  # intl: ^0.20.2
  # uuid: ^4.5.1
  flutter_map: ^7.0.0
  latlong2: ^0.9.1
  qr_flutter: ^4.1.0
  smooth_page_indicator: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
